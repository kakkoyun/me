baseurl: "https://kakkoyun.me"
title: "kakkoyun"
theme: "PaperMod"

enableRobotsTXT: true

defaultContentLanguage: "en"
buildDrafts: false

pagination:
  pagerSize: 5


outputFormats:
  markdown:
    name: markdown
    baseName: index
    mediaType: text/markdown
    isPlainText: true
  llms:
    name: llms
    baseName: llms
    mediaType: text/plain
    isPlainText: true
    notAlternative: true
  # Substack-tuned syndication feed (served at /substack.xml). Full-text
  # <content:encoded> with absolutised image/link URLs and a top "Originally
  # published at" backlink. Point Substack's Settings -> Import at this feed.
  # See docs/substack-syndication.md.
  substack:
    name: substack
    baseName: substack
    mediaType: application/rss+xml
    isPlainText: false
    isHTML: false
    noUgly: true
    rel: alternate
    notAlternative: true

outputs:
  home:
    - HTML
    - RSS
    - JSON
    - llms
    - substack
  page:
    - HTML
    - MARKDOWN
  section:
    - HTML
    - RSS
    - MARKDOWN
  term:
    - HTML
    - MARKDOWN

markup:
  highlight:
    # anchorLineNos: true
    codeFences: true
    guessSyntax: true
    lineNos: true
    # noClasses: false
    style: monokai
  goldmark:
    renderer:
      unsafe: true
menu:
  main:
    - name: "Now"
      weight: 10
      url: "/now/"
    - name: "About"
      weight: 11
      url: "/about/"
    # - name: "Uses"
    #   weight: 12
    #   url: "/uses/"
    - name: "Blog"
      weight: 20
      url: "/posts/"
    # - name: "Open Source"
    #   weight: 30
    #   url: "/open_source/"
    - name: "Talks"
      weight: 40
      url: "/categories/talks"
    # - name: "Stats"
    #   weight: 50
    #   url: "/stats/"
    - name: "Newsletter"
      weight: 70
      url: "/newsletter/"
    - name: "Notes"
      weight: 80
      url: "/notes/"
    # - name: "Sponsorship"
    #   weight: 90
    #   url: "/sponsorship/"
    - name: "Misc"
      weight: 100
      url: "/misc/"
    # - name: "Archives"
    #   weight: 101
    #   url: "/archives/"
    - name: "Graph"
      weight: 101
      url: "/graph/"
    - name: "Search"
      weight: 102
      url: "/search/"

