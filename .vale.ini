StylesPath = styles
MinAlertLevel = suggestion
Vocab = Kakkoyun

Packages = proselint, write-good

[*.md]
BasedOnStyles = Vale, Slop, proselint, write-good

# Disable rules that fight the author's voice
Vale.Spelling = NO
write-good.Passive = NO
write-good.E-Prime = NO
write-good.TooWordy = suggestion
write-good.Weasel = suggestion
proselint.Cliches.Hyperbolic = suggestion
proselint.Skunked = suggestion
proselint.Typography = NO

[content/posts/**/*.md]
BasedOnStyles = Vale, Slop, proselint, write-good

[content/talks/**/*.md]
BasedOnStyles = Vale, Slop, proselint, write-good

[content/notes/**/*.md]
# Notes are mirrored from Obsidian via main.yml; do not lint them.
BasedOnStyles =

[themes/**]
BasedOnStyles =

[public/**]
BasedOnStyles =

# Documentation files that describe the prose rules cannot themselves be linted
# by those rules without false-positives on every example phrase they list.
[REVIEW.md]
BasedOnStyles = Vale

[.claude/skills/**/*.md]
BasedOnStyles = Vale

[CLAUDE.md]
BasedOnStyles = Vale
