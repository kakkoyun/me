name: Build & Verify

on:
  push:
    branches: [master]
    paths:
      - 'content/**'
      - 'layouts/**'
      - 'themes/**'
      - 'static/**'
      - 'assets/**'
      - 'archetypes/**'
      - 'config.yaml'
      - '.hugo-version'
      - 'scripts/verify-build.sh'
      - '.lighthouserc.yml'
      - '.github/workflows/build.yml'
  pull_request:
    branches: [master]
    paths:
      - 'content/**'
      - 'layouts/**'
      - 'themes/**'
      - 'static/**'
      - 'assets/**'
      - 'archetypes/**'
      - 'config.yaml'
      - '.hugo-version'
      - 'scripts/verify-build.sh'
      - '.lighthouserc.yml'
      - '.github/workflows/build.yml'

jobs:
  build-verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          submodules: true
          fetch-depth: 0

      - name: Read Hugo version
        id: hugo-version
        run: echo "version=$(cat .hugo-version)" >> "$GITHUB_OUTPUT"

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@2752ce1d29631191ea3f27c23495fa06139a5b78 # v3
        with:
          hugo-version: ${{ steps.hugo-version.outputs.version }}
          extended: true

      - name: Build (production)
        run: hugo --gc --minify --enableGitInfo
        env:
          HUGO_ENV: production

      - name: Verify build output
        run: bash scripts/verify-build.sh public

  lighthouse:
    runs-on: ubuntu-latest
    needs: build-verify
    permissions:
      issues: write
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          submodules: true
          fetch-depth: 0

      - name: Read Hugo version
        id: hugo-version
        run: echo "version=$(cat .hugo-version)" >> "$GITHUB_OUTPUT"

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@2752ce1d29631191ea3f27c23495fa06139a5b78 # v3
        with:
          hugo-version: ${{ steps.hugo-version.outputs.version }}
          extended: true

      - name: Build (production)
        run: hugo --gc --minify --enableGitInfo
        env:
          HUGO_ENV: production

      - name: Run Lighthouse CI
        id: lhci
        uses: treosh/lighthouse-ci-action@3e7e23fb74242897f95c0ba9cabad3d0227b9b18 # v12
        continue-on-error: true
        with:
          configPath: .lighthouserc.yml
          uploadArtifacts: true

      - name: Open issue on score drop
        if: steps.lhci.outcome == 'failure' && github.event_name == 'push'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        with:
          script: |
            const title = 'Lighthouse score drop detected';
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: ['lighthouse'],
            });
            if (issues.some(i => i.title === title)) {
              console.log('Issue already open, skipping duplicate.');
              return;
            }
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              labels: ['lighthouse'],
              body: [
                '## Lighthouse score drop',
                '',
                `One or more scores dropped below thresholds on commit ${context.sha}.`,
                '',
                '| Category | Threshold |',
                '|----------|-----------|',
                '| Performance | ≥ 90 |',
                '| Accessibility | ≥ 97 |',
                '| Best Practices | ≥ 95 |',
                '| SEO | ≥ 97 |',
                '',
                `**Workflow run:** ${context.payload.repository.html_url}/actions/runs/${context.runId}`,
                '',
                'Download the Lighthouse report from the workflow artifacts for details.',
              ].join('\n'),
            });
