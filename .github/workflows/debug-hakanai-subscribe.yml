name: Debug Hakanai subscribe (ad hoc)

# One-off debug workflow: POSTs to the Hakanai subscribe endpoint from a
# GitHub-hosted runner (which has unrestricted internet) and posts the
# full HTTP response back as a comment on issue #165, since the Claude
# sandbox proxy blocks *.hakanai.io. Delete this workflow + branch
# when we're done debugging.

on:
  push:
    branches: [debug/hakanai-subscribe-test]
  workflow_dispatch:
    inputs:
      email:
        description: 'Email to test-subscribe'
        required: true
        default: 'kakkoyun@gmail.com'
      campaign_id:
        description: 'Campaign ID'
        required: true
        default: 'c5029a05-9d18-4c54-8b44-1e8b270a6841'

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    permissions:
      issues: write
    steps:
      - name: Probe Hakanai subscribe endpoints
        id: probe
        env:
          EMAIL: ${{ github.event.inputs.email || 'kakkoyun@gmail.com' }}
          CAMPAIGN_ID: ${{ github.event.inputs.campaign_id || 'c5029a05-9d18-4c54-8b44-1e8b270a6841' }}
          TRIGGER: ${{ github.event_name }}
        run: |
          set +e

          probe() {
            local label="$1"
            local url="$2"
            local content_type="$3"
            local data="$4"

            local headers
            local body
            headers=$(mktemp)
            body=$(mktemp)
            local elapsed_file
            elapsed_file=$(mktemp)

            echo ""
            echo "## $label"
            echo ""
            echo "- **URL:** \`$url\`"
            echo "- **Content-Type:** \`$content_type\`"
            echo "- **Body:** \`$data\`"

            local started end status
            started=$(date +%s)

            status=$(curl -sS --connect-timeout 10 --max-time 30 \
              -o "$body" -D "$headers" -w "%{http_code}" \
              -X POST \
              -H "User-Agent: Mozilla/5.0 (kakkoyun-debug)" \
              -H "Accept: text/html,application/json;q=0.9,*/*;q=0.8" \
              -H "Origin: https://kakkoyun.me" \
              -H "Referer: https://kakkoyun.me/" \
              -H "Content-Type: $content_type" \
              --data "$data" \
              "$url" 2>"$elapsed_file")
            local curl_exit=$?
            end=$(date +%s)
            local dt=$((end - started))

            echo "- **curl exit code:** \`$curl_exit\`"
            echo "- **HTTP status:** \`${status:-(none)}\`"
            echo "- **Elapsed:** \`${dt}s\`"

            if [[ -s "$elapsed_file" ]]; then
              echo ""
              echo "### curl stderr"
              echo '```'
              cat "$elapsed_file"
              echo '```'
            fi

            echo ""
            echo "### Response headers"
            echo '```'
            if [[ -s "$headers" ]]; then cat "$headers"; else echo "(empty)"; fi
            echo '```'

            echo ""
            echo "### Response body"
            echo '```'
            if [[ -s "$body" ]]; then
              head -c 4096 "$body"
              local total
              total=$(wc -c < "$body")
              if (( total > 4096 )); then
                echo ""
                echo "... (truncated, total $total bytes)"
              fi
            else
              echo "(empty)"
            fi
            echo '```'
          }

          {
            echo "# Hakanai subscribe probe — \`${TRIGGER}\`"
            echo ""
            echo "Run: [${GITHUB_RUN_ID}](${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID})"
            echo "Time: \`$(date -u +%Y-%m-%dT%H:%M:%SZ)\`"

            # D: GET the SPA shell and look for hardcoded API URLs in the
            # served HTML. The form is mounted client-side by Nuxt; the
            # server-rendered HTML still includes the JS bundle and may
            # embed the API URL in a __NUXT_DATA__ or hydration payload.
            echo ""
            echo "## D. GET the SPA shell --- find API endpoint in HTML"
            echo '```'
            page=$(mktemp)
            curl -sS --connect-timeout 10 --max-time 20 \
              -H "User-Agent: Mozilla/5.0 (kakkoyun-debug)" \
              -o "$page" -w "status=%{http_code}\n" \
              "https://broadcast.hakanai.io/campaign/${CAMPAIGN_ID}/subscribe"
            echo ""
            echo "--- /api/ references in the page ---"
            grep -oE '"/api/[^"]+"|\\u002Fapi\\u002F[^"]+|/api/[A-Za-z0-9/_.-]+' "$page" | sort -u | head -30
            echo ""
            echo "--- 'subscribe' string occurrences ---"
            grep -oE '"[^"]*subscribe[^"]*"' "$page" | sort -u | head -30
            echo ""
            echo "--- 'email' field-related strings ---"
            grep -oE '"[^"]{0,30}email[^"]{0,30}"' "$page" | sort -u | head -20
            echo ""
            echo "--- JS bundle URLs (for follow-up grep if needed) ---"
            grep -oE 'src="/_nuxt/[^"]+\.js"' "$page" | head -5
            echo '```'

            # G: OPTIONS preflight against the API endpoint --- reveals
            # allowed methods and headers, which often hints at right path.
            echo ""
            echo "## G. OPTIONS on /api/.../subscribe"
            echo '```'
            curl -sS -i -X OPTIONS --connect-timeout 10 --max-time 15 \
              -H "Origin: https://kakkoyun.me" \
              -H "Access-Control-Request-Method: POST" \
              -H "Access-Control-Request-Headers: content-type" \
              "https://broadcast.hakanai.io/api/campaign/${CAMPAIGN_ID}/subscribe" 2>&1 | head -30
            echo '```'

            # H: same API endpoint but with Accept: application/json only ---
            # forces the server to return a JSON error body instead of HTML.
            echo ""
            echo "## H. POST API with Accept: application/json (force JSON error)"
            echo '```'
            curl -sS -i --connect-timeout 10 --max-time 30 \
              -X POST \
              -H "User-Agent: Mozilla/5.0 (kakkoyun-debug)" \
              -H "Accept: application/json" \
              -H "Origin: https://kakkoyun.me" \
              -H "Referer: https://kakkoyun.me/" \
              -H "Content-Type: application/json" \
              --data "{\"email\":\"${EMAIL}\"}" \
              "https://broadcast.hakanai.io/api/campaign/${CAMPAIGN_ID}/subscribe" 2>&1 | head -50
            echo '```'

            # I: POST with email in query string, no body
            echo ""
            echo "## I. POST /api/.../subscribe?email=... (query string, no body)"
            echo '```'
            email_enc=$(printf %s "${EMAIL}" | jq -sRr @uri)
            curl -sS -i --connect-timeout 10 --max-time 30 \
              -X POST \
              -H "User-Agent: Mozilla/5.0 (kakkoyun-debug)" \
              -H "Accept: application/json" \
              -H "Origin: https://kakkoyun.me" \
              -H "Referer: https://kakkoyun.me/" \
              "https://broadcast.hakanai.io/api/campaign/${CAMPAIGN_ID}/subscribe?email=${email_enc}" 2>&1 | head -50
            echo '```'

            # J: GET with email in query string
            echo ""
            echo "## J. GET /api/.../subscribe?email=... (query string, GET)"
            echo '```'
            curl -sS -i --connect-timeout 10 --max-time 30 \
              -X GET \
              -H "User-Agent: Mozilla/5.0 (kakkoyun-debug)" \
              -H "Accept: application/json" \
              -H "Origin: https://kakkoyun.me" \
              -H "Referer: https://kakkoyun.me/" \
              "https://broadcast.hakanai.io/api/campaign/${CAMPAIGN_ID}/subscribe?email=${email_enc}" 2>&1 | head -50
            echo '```'

            # Probe A: the form endpoint that the homepage <form action> points at.
            probe "A. POST form endpoint (urlencoded)" \
              "https://broadcast.hakanai.io/campaign/${CAMPAIGN_ID}/subscribe" \
              "application/x-www-form-urlencoded" \
              "email=${EMAIL}"

            # Probe B: the API endpoint with JSON.
            probe "B. POST API endpoint (JSON)" \
              "https://broadcast.hakanai.io/api/campaign/${CAMPAIGN_ID}/subscribe" \
              "application/json" \
              "{\"email\":\"${EMAIL}\"}"

            # Probe E: API endpoint with a more complete payload.
            probe "E. POST API endpoint (JSON with consent)" \
              "https://broadcast.hakanai.io/api/campaign/${CAMPAIGN_ID}/subscribe" \
              "application/json" \
              "{\"email\":\"${EMAIL}\",\"consent\":true,\"opt_in\":true}"

            # Probe F: same form endpoint but as multipart/form-data.
            echo ""
            echo "## F. POST form endpoint (multipart)"
            echo '```'
            curl -sS --connect-timeout 10 --max-time 30 -i \
              -H "User-Agent: Mozilla/5.0 (kakkoyun-debug)" \
              -H "Origin: https://kakkoyun.me" \
              -H "Referer: https://kakkoyun.me/" \
              -F "email=${EMAIL}" \
              "https://broadcast.hakanai.io/campaign/${CAMPAIGN_ID}/subscribe" 2>&1 | head -30
            echo '```'

            # Probe C: TLS-only handshake check to see if the host even responds.
            echo ""
            echo "## C. Plain HEAD to broadcast.hakanai.io"
            echo '```'
            curl -sS -I --connect-timeout 10 --max-time 15 https://broadcast.hakanai.io/ 2>&1 | head -30
            echo '```'
          } | tee /tmp/comment.md

          cat /tmp/comment.md >> "$GITHUB_STEP_SUMMARY"

      - name: Comment on issue #165
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let body;
            try {
              body = fs.readFileSync('/tmp/comment.md', 'utf8');
            } catch (e) {
              body = `Probe step did not produce a comment file: ${e.message}\n\nRun: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            }
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: 165,
              body,
            });
