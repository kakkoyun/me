name: Debug Hakanai (ad hoc)

# One-off debug workflow. Used because the Claude dev sandbox proxy
# blocks *.hakanai.io with x-deny-reason: host_not_allowed. Push to
# the debug/hakanai-subscribe-test branch to run; the job posts its
# findings back as a comment on issue #165.

on:
  push:
    branches: [debug/hakanai-subscribe-test]
  workflow_dispatch:
    inputs:
      mode:
        description: What to probe
        required: true
        default: docs
        type: choice
        options:
          - docs
          - api
      email:
        description: '(api mode) Email to test-subscribe'
        required: false
        default: kakkoyun@gmail.com
      campaign_id:
        description: '(api mode) Campaign ID'
        required: false
        default: c5029a05-9d18-4c54-8b44-1e8b270a6841

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    permissions:
      issues: write
    env:
      MODE: ${{ github.event.inputs.mode || 'api' }}
      EMAIL: ${{ github.event.inputs.email || 'kakkoyun@gmail.com' }}
      CAMPAIGN_ID: ${{ github.event.inputs.campaign_id || 'c5029a05-9d18-4c54-8b44-1e8b270a6841' }}
    steps:
      - name: Probe
        id: probe
        run: |
          set +e

          fetch_doc() {
            local label="$1"
            local url="$2"
            local page
            page=$(mktemp)

            echo ""
            echo "## $label"
            echo "$url"

            curl -sS --connect-timeout 10 --max-time 30 \
              -H "User-Agent: Mozilla/5.0 (kakkoyun-debug)" \
              -o "$page" \
              -w "status=%{http_code} bytes=%{size_download}" \
              "$url"
            echo ""

            echo ""
            echo "### Plaintext body (HTML stripped, first 8 KiB)"
            echo '```'
            sed -e 's/<script[^>]*>[^<]*<\/script>//g' \
                -e 's/<style[^>]*>[^<]*<\/style>//g' \
                -e 's/<[^>]*>/ /g' "$page" \
              | tr -s ' \t\r\n' '\n' \
              | grep -v '^[[:space:]]*$' \
              | head -c 8192
            echo ""
            echo '```'

            echo ""
            echo "### API URLs and shapes embedded in page"
            echo '```'
            {
              grep -oE '/api/[A-Za-z0-9/_{}.\-]+' "$page"
              grep -oE '\\u002Fapi\\u002F[A-Za-z0-9/_{}.\-]+' "$page" \
                | sed 's/\\u002F/\//g'
            } | sort -u | head -40
            echo '```'

            echo ""
            echo "### Lines mentioning verbs / fields"
            echo '```'
            tr '<>' '\n\n' < "$page" \
              | grep -iE 'POST|GET|application/json|formData|content-type|api/campaign|/subscribe|email|campaign_id|honeypot|csrf|consent' \
              | grep -vE '^\s*$|<style|<script|@layer|--ui-color' \
              | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//' \
              | sort -u \
              | head -80
            echo '```'
          }

          probe_api() {
            local label="$1"
            local method="$2"
            local url="$3"
            local extra_args=("${@:4}")

            echo ""
            echo "## $label"
            echo "\`$method $url\`"
            echo ""
            echo '```'
            curl -sS -i --connect-timeout 10 --max-time 30 \
              -X "$method" \
              -H "Accept: application/json" \
              -H "User-Agent: Mozilla/5.0 (kakkoyun-debug)" \
              "${extra_args[@]}" \
              "$url" 2>&1 | head -40
            echo '```'
          }

          {
            echo "# Hakanai debug --- mode: $MODE"
            echo ""
            echo "Run: [${GITHUB_RUN_ID}](${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID})"
            echo "Time: \`$(date -u +%Y-%m-%dT%H:%M:%SZ)\`"

            if [[ "$MODE" == "docs" ]]; then
              fetch_doc "Forms doc" "https://hakanai.io/docs/broadcast/forms"
              fetch_doc "Subscribers doc" "https://hakanai.io/docs/broadcast/subscribers"
              fetch_doc "Emails doc" "https://hakanai.io/docs/broadcast/emails"
              fetch_doc "API overview" "https://hakanai.io/docs/broadcast/api"
              fetch_doc "Campaigns doc" "https://hakanai.io/docs/broadcast/campaigns"
            else
              email_enc=$(printf %s "${EMAIL}" | jq -sRr @uri)

              # The documented endpoint per
              # https://hakanai.io/docs/broadcast/forms is hakanai.io
              # (NOT broadcast.hakanai.io) and the path is
              # /api/subscribe/{id} (NOT /api/campaign/{id}/subscribe).
              # The latter was a campaign-metadata endpoint that
              # returned 200 but never subscribed.
              docs_url="https://hakanai.io/api/subscribe/${CAMPAIGN_ID}"
              probe_api "GET docs URL with email query"  GET  "$docs_url?email=$email_enc"
              probe_api "POST docs URL with email query" POST "$docs_url?email=$email_enc"

              # Sanity: also probe the previously-tried URL so the
              # comparison stays in the issue history.
              old_url="https://broadcast.hakanai.io/api/campaign/${CAMPAIGN_ID}/subscribe"
              probe_api "GET old (campaign-metadata) URL" GET "$old_url?email=$email_enc"
            fi
          } | tee /tmp/comment.md

          cat /tmp/comment.md >> "$GITHUB_STEP_SUMMARY"

      - name: Comment on issue #165
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let body;
            try {
              body = fs.readFileSync('/tmp/comment.md', 'utf8');
              // GitHub issue-comment limit is 65536 chars; chunk if needed.
              if (body.length > 60000) {
                body = body.slice(0, 60000) + '\n\n... (truncated; see step summary)';
              }
            } catch (e) {
              body = `Step did not produce a comment file: ${e.message}\n\nRun: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            }
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: 165,
              body,
            });
