name: Prose Review

on:
  pull_request:
    types: [opened, ready_for_review, reopened, labeled]
    paths:
      - 'content/posts/**/*.md'
      - 'content/talks/**/*.md'

jobs:
  prose-review:
    if: >-
      contains(github.event.pull_request.labels.*.name, 'prose-review') &&
      github.event.pull_request.draft == false &&
      contains(fromJSON('["OWNER", "MEMBER", "COLLABORATOR"]'), github.event.pull_request.author_association)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 1

      - name: Run prose review
        id: prose-review
        uses: anthropics/claude-code-action@70a6e5256e9e2366a1ed5c041904a982ba3a328f # v1.0.135
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          plugin_marketplaces: 'https://github.com/anthropics/claude-code.git'
          plugins: 'code-review@claude-code-plugins'
          prompt: |
            /code-review:code-review ${{ github.repository }}/pull/${{ github.event.pull_request.number }} --comment

            Apply this as a PROSE-ONLY review of a blog post under content/posts/ or content/talks/. Follow the procedure in `.claude/commands/prose-review.md`: read that file for the priority list, do-not-flag list, and output format, then apply those alongside the plugin's posting flow.
