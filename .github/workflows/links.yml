name: Check Links

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  schedule:
    # Run weekly on Sundays at midnight UTC
    - cron: '0 0 * * 0'
  workflow_dispatch:

jobs:
  check-links:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Check links with lychee
        uses: lycheeverse/lychee-action@8646ba30535128ac92d33dfc9133794bfdd9b411 # v2
        with:
          # --accept 200..=299,403,429: lychee v2 (lychee >=0.15) treats --accept as a
          #   whitelist that REPLACES the default accepted codes; 200..=299 must be listed
          #   explicitly or all successful responses are rejected. 403/429 are also accepted
          #   because many valid reference sites (sched.co, linux.die.net, npmjs.com,
          #   science.sciencemag.org, platform.openai.com, patreon.com) reject automated
          #   crawlers with those codes but are reachable for human visitors.
          # --base: resolves root-relative links (e.g. /misc/, /uploads/photo.jpg) in local
          #   markdown files against the live site so lychee can actually check them.
          # --exclude social/content platforms: linkedin, twitter/x, youtube, hachyderm,
          #   medium, stackoverflow, news.ycombinator.com all block bots reliably.
          # --exclude github.com/kakkoyun/me/edit: edit links require authentication.
          # --exclude localhost: local development URLs, not real links.
          # --exclude gophercon.ist: domain permanently gone.
          # --exclude logitech.com: persistent HTTP/2 protocol errors from their CDN.
          # --exclude matryer.com, metalmatze.de: persistent timeouts; personal sites
          #   that are frequently unreachable by automated crawlers.
          # --exclude gitpitch.com: defunct slide-hosting service, all links are dead.
          # --exclude gophercon.eu: event domain returns 404 (past year's content gone).
          args: >-
            --verbose
            --no-progress
            --max-concurrency 8
            --insecure
            --max-retries 3
            --retry-wait-time 5
            --timeout 30
            --accept '200..=299,403,429'
            --base 'https://kakkoyun.me'
            --exclude 'linkedin.com'
            --exclude 'twitter.com'
            --exclude 'x.com'
            --exclude 'youtube.com'
            --exclude 'hachyderm.io'
            --exclude 'medium.com'
            --exclude 'stackoverflow.com'
            --exclude 'news.ycombinator.com'
            --exclude 'github.com/kakkoyun/me/edit'
            --exclude 'localhost'
            --exclude 'gophercon.ist'
            --exclude 'logitech.com'
            --exclude 'matryer.com'
            --exclude 'metalmatze.de'
            --exclude 'gitpitch.com'
            --exclude 'gophercon.eu'
            './content/**/*.md'
          fail: true

      - name: Create issue on failure
        if: failure()
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        with:
          script: |
            const title = '🔗 Broken links detected';
            const body = `Broken links were detected in the content.

            Check the [workflow run](${context.payload.repository.html_url}/actions/runs/${context.runId}) for details.`;

            // Check if an issue already exists
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: ['broken-links']
            });

            if (issues.data.length === 0) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: title,
                body: body,
                labels: ['broken-links', 'automated']
              });
            }
