name: Promote New Post

on:
  schedule:
    # Run every day at 6 AM UTC — catches scheduled posts on their publish day
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      post_path:
        description: 'Path to a specific post (content/posts/my-post.md). Leave blank to promote everything due today.'
        required: false
        type: string
      dry_run:
        description: 'Install a stub buffer-cli that echoes instead of posting'
        required: false
        default: 'false'
        type: boolean

jobs:
  # Publishing the site is no longer this workflow's job — that moved to
  # deploy-scheduled.yml, which rebuilds just after midnight UTC so a post goes
  # live on its publish day regardless of whether this promotion cron fires.
  # Promotion here instead guards on liveness (see "Verify posts are live"
  # below): it will not post a social link to a page that is not yet reachable.
  #
  # Triggers: the daily cron promotes posts on their publish day; workflow_dispatch
  # is the manual "promote now" button (one post via post_path, or everything due
  # today when left blank). There is no push trigger — claude-code-action rejects
  # the push event type ("Unsupported event type: push").
  promote:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          submodules: false

      - name: Find promotable posts
        id: find
        # POST_PATH is passed via env, not interpolated into the script body:
        # `${{ ... }}` is expanded before bash runs, so a dispatch input containing
        # $(...) or backticks would otherwise execute on the runner (script injection).
        # As an env var it reaches bash as opaque data.
        env:
          POST_PATH: ${{ github.event.inputs.post_path }}
        run: |
          chmod +x scripts/find-promotable-posts.sh
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "$POST_PATH" ]; then
            # Manual run targeting one specific post (skips the date check).
            POSTS=$(scripts/find-promotable-posts.sh manual "$POST_PATH")
          else
            # Daily cron, or a manual run with no post_path: promote everything due today.
            POSTS=$(scripts/find-promotable-posts.sh schedule)
          fi

          if [ -z "$POSTS" ]; then
            echo "No posts to promote"
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          else
            echo "Found posts to promote:"
            echo "$POSTS"
            {
              echo "posts<<EOF"
              echo "$POSTS"
              echo "EOF"
              echo "should_run=true"
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Verify posts are live
        id: live
        if: steps.find.outputs.should_run == 'true'
        # Guard against promoting a dead link: a post is only worth a social post
        # once its page is actually reachable. scripts/check-post-live.sh maps each
        # post file to its public URL (content/posts/<slug>.md → /posts/<slug>/),
        # polls it, and emits only the live ones (dropping the rest with a
        # ::warning::). Extracted into a script so the mapping/filtering logic is
        # unit-tested (scripts/test-check-post-live.sh) and shellcheck-linted,
        # rather than living untested inside this YAML.
        run: |
          set -uo pipefail
          chmod +x scripts/check-post-live.sh
          live=$(scripts/check-post-live.sh <<< "${{ steps.find.outputs.posts }}")
          if [ -z "$live" ]; then
            echo "No live posts to promote"
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          else
            {
              echo "posts<<EOF"
              echo "$live"
              echo "EOF"
              echo "should_run=true"
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout humanizer skill submodule
        if: steps.live.outputs.should_run == 'true'
        run: git submodule update --init --depth 1 tools/humanizer

      - name: Install buffer-cli
        if: steps.live.outputs.should_run == 'true' && github.event.inputs.dry_run != 'true'
        run: |
          mkdir -p "$HOME/.local/bin"
          curl -sL https://github.com/erickhun/buffer-cli/releases/latest/download/buffer-linux-amd64 \
            -o "$HOME/.local/bin/buffer-cli"
          chmod +x "$HOME/.local/bin/buffer-cli"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Install buffer-cli stub (dry-run)
        if: steps.live.outputs.should_run == 'true' && github.event.inputs.dry_run == 'true'
        run: |
          mkdir -p "$HOME/.local/bin"
          cat > "$HOME/.local/bin/buffer-cli" <<'STUB'
          #!/usr/bin/env bash
          # Stub buffer-cli for dry-run: log args, never post.
          printf '[stub buffer-cli] argv:' >&2
          for a in "$@"; do printf ' %q' "$a" >&2; done
          printf '\n' >&2
          echo '{"id":"stub","scheduled_at":null}'
          STUB
          chmod +x "$HOME/.local/bin/buffer-cli"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Promote with Claude
        if: steps.live.outputs.should_run == 'true'
        uses: anthropics/claude-code-action@44423bdec74b97d67543eb16c110546762c110b2 # v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            Promote the following blog post(s) to social media.

            Read .claude/commands/promote-post.md for full instructions, then execute.

            Two skills shape the writing — use them, don't just acknowledge them:

            - `kemal-voice` (.claude/skills/kemal-voice/SKILL.md) — anchors the
              author's voice and lists banned vocabulary / formulaic openers.
              Read it before drafting.
            - `humanizer` (.claude/skills/humanizer/SKILL.md) — AI-pattern
              cleanup pass. After drafting each platform's message, run it
              through the humanizer pass before posting. Apply the final
              anti-AI audit ("what makes this obviously AI-generated?" → fix).

            Posts to promote:
            ${{ steps.live.outputs.posts }}
          claude_args: --allowedTools "Read,Bash(buffer-cli:*),Bash(echo:*)"
        env:
          BUFFER_AUTH_TOKEN: ${{ secrets.BUFFER_AUTH_TOKEN }}
