name: Promote New Post

on:
  push:
    branches: [master]
    paths: ['content/posts/**']
  schedule:
    # Run every day at 6 AM UTC — catches scheduled posts on their publish day
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      post_path:
        description: 'Path to post file (e.g., content/posts/my-post.md)'
        required: true
        type: string
      dry_run:
        description: 'Install a stub buffer-cli that echoes instead of posting'
        required: false
        default: 'false'
        type: boolean

jobs:
  deploy:
    # Only needed on schedule — push to master already triggers a Netlify deploy,
    # and workflow_dispatch is manual control. On schedule, we must rebuild so
    # posts whose publishDate has arrived become live before promotion fires.
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Validate secret
        run: |
          if [ -z "$NETLIFY_BUILD_HOOK_URL" ]; then
            echo "::error::NETLIFY_BUILD_HOOK_URL secret is not set. Add it under repo Settings → Secrets → Actions."
            exit 1
          fi
        env:
          NETLIFY_BUILD_HOOK_URL: ${{ secrets.NETLIFY_BUILD_HOOK_URL }}
      - name: Trigger Netlify build
        run: curl -fsS -X POST -d '{}' "${{ secrets.NETLIFY_BUILD_HOOK_URL }}"
      - name: Wait for Netlify build to complete
        # Hugo builds typically take 1-3 min; 5 min covers queue delays and slower runners.
        run: sleep 300

  promote:
    needs: [deploy]
    # Run when deploy succeeded or was skipped (push / workflow_dispatch).
    # Also run when deploy failed: a missed rebuild shouldn't block promotion of a
    # post that may already be live from a prior deploy.
    if: always() && needs.deploy.result != 'cancelled'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0  # Full history needed for git log in schedule/dedup mode
          submodules: false

      - name: Find promotable posts
        id: find
        run: |
          chmod +x scripts/find-promotable-posts.sh
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            POSTS=$(scripts/find-promotable-posts.sh manual "${{ github.event.inputs.post_path }}")
          elif [ "${{ github.event_name }}" = "schedule" ]; then
            POSTS=$(scripts/find-promotable-posts.sh schedule)
          else
            POSTS=$(scripts/find-promotable-posts.sh push)
          fi

          if [ -z "$POSTS" ]; then
            echo "No posts to promote"
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          else
            echo "Found posts to promote:"
            echo "$POSTS"
            {
              echo "posts<<EOF"
              echo "$POSTS"
              echo "EOF"
              echo "should_run=true"
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout humanizer skill submodule
        if: steps.find.outputs.should_run == 'true'
        run: git submodule update --init --depth 1 tools/humanizer

      - name: Install buffer-cli
        if: steps.find.outputs.should_run == 'true' && github.event.inputs.dry_run != 'true'
        run: |
          mkdir -p "$HOME/.local/bin"
          curl -sL https://github.com/erickhun/buffer-cli/releases/latest/download/buffer-linux-amd64 \
            -o "$HOME/.local/bin/buffer-cli"
          chmod +x "$HOME/.local/bin/buffer-cli"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Install buffer-cli stub (dry-run)
        if: steps.find.outputs.should_run == 'true' && github.event.inputs.dry_run == 'true'
        run: |
          mkdir -p "$HOME/.local/bin"
          cat > "$HOME/.local/bin/buffer-cli" <<'STUB'
          #!/usr/bin/env bash
          # Stub buffer-cli for dry-run: log args, never post.
          printf '[stub buffer-cli] argv:' >&2
          for a in "$@"; do printf ' %q' "$a" >&2; done
          printf '\n' >&2
          echo '{"id":"stub","scheduled_at":null}'
          STUB
          chmod +x "$HOME/.local/bin/buffer-cli"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Promote with Claude
        if: steps.find.outputs.should_run == 'true'
        uses: anthropics/claude-code-action@86eb26bf0139bdd75acd15ea5f00f45ee0a284c2 # v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            Promote the following blog post(s) to social media.

            Read .claude/commands/promote-post.md for full instructions, then execute.

            Two skills shape the writing — use them, don't just acknowledge them:

            - `kemal-voice` (.claude/skills/kemal-voice/SKILL.md) — anchors the
              author's voice and lists banned vocabulary / formulaic openers.
              Read it before drafting.
            - `humanizer` (.claude/skills/humanizer/SKILL.md) — AI-pattern
              cleanup pass. After drafting each platform's message, run it
              through the humanizer pass before posting. Apply the final
              anti-AI audit ("what makes this obviously AI-generated?" → fix).

            Posts to promote:
            ${{ steps.find.outputs.posts }}
          claude_args: --allowedTools "Read,Bash(buffer-cli:*),Bash(echo:*)"
        env:
          BUFFER_AUTH_TOKEN: ${{ secrets.BUFFER_AUTH_TOKEN }}
