name: Promote New Post

on:
  push:
    branches: [master]
    paths: ['content/posts/**']
  schedule:
    # Run every day at 6 AM UTC — catches scheduled posts on their publish day
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      post_path:
        description: 'Path to post file (e.g., content/posts/my-post.md)'
        required: true
        type: string
      dry_run:
        description: 'Install a stub buffer-cli that echoes instead of posting'
        required: false
        default: 'false'
        type: boolean

jobs:
  # Publishing the site is no longer this workflow's job — that moved to
  # deploy-scheduled.yml, which rebuilds just after midnight UTC so a post goes
  # live on its publish day regardless of whether this promotion cron fires.
  # Promotion here instead guards on liveness (see "Verify posts are live"
  # below): it will not post a social link to a page that is not yet reachable.
  promote:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0  # Full history needed for git log in schedule/dedup mode
          submodules: false

      - name: Find promotable posts
        id: find
        run: |
          chmod +x scripts/find-promotable-posts.sh
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            POSTS=$(scripts/find-promotable-posts.sh manual "${{ github.event.inputs.post_path }}")
          elif [ "${{ github.event_name }}" = "schedule" ]; then
            POSTS=$(scripts/find-promotable-posts.sh schedule)
          else
            POSTS=$(scripts/find-promotable-posts.sh push)
          fi

          if [ -z "$POSTS" ]; then
            echo "No posts to promote"
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          else
            echo "Found posts to promote:"
            echo "$POSTS"
            {
              echo "posts<<EOF"
              echo "$POSTS"
              echo "EOF"
              echo "should_run=true"
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Verify posts are live
        id: live
        if: steps.find.outputs.should_run == 'true'
        # Guard against promoting a dead link: a post is only worth a social
        # post once its page is actually reachable. Maps each post file to its
        # public URL (content/posts/<slug>.md → /posts/<slug>/) and polls it.
        # This also lets push-mode promotion wait out an in-flight Netlify deploy
        # instead of racing it. Posts that never come live are dropped with a
        # warning; if none survive, promotion is skipped.
        run: |
          set -uo pipefail
          base="https://kakkoyun.me"
          live=""
          while IFS= read -r path; do
            [ -z "$path" ] && continue
            slug=$(basename "$path" .md)
            url="$base/posts/$slug/"
            ok=""
            for attempt in $(seq 1 20); do   # 20 × 15s ≈ 5 min for an in-flight deploy
              code=$(curl -fsS -o /dev/null -w '%{http_code}' --max-time 10 "$url" || echo "000")
              if [ "$code" = "200" ]; then ok="yes"; break; fi
              echo "  $url → HTTP $code (attempt $attempt), retrying in 15s…"
              sleep 15
            done
            if [ -n "$ok" ]; then
              echo "Live: $url"
              live="${live:+$live$'\n'}$path"
            else
              echo "::warning::Skipping promotion — $url is not live (last HTTP $code). The post may not have deployed yet."
            fi
          done <<< "${{ steps.find.outputs.posts }}"

          if [ -z "$live" ]; then
            echo "No live posts to promote"
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          else
            {
              echo "posts<<EOF"
              echo "$live"
              echo "EOF"
              echo "should_run=true"
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout humanizer skill submodule
        if: steps.live.outputs.should_run == 'true'
        run: git submodule update --init --depth 1 tools/humanizer

      - name: Install buffer-cli
        if: steps.live.outputs.should_run == 'true' && github.event.inputs.dry_run != 'true'
        run: |
          mkdir -p "$HOME/.local/bin"
          curl -sL https://github.com/erickhun/buffer-cli/releases/latest/download/buffer-linux-amd64 \
            -o "$HOME/.local/bin/buffer-cli"
          chmod +x "$HOME/.local/bin/buffer-cli"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Install buffer-cli stub (dry-run)
        if: steps.live.outputs.should_run == 'true' && github.event.inputs.dry_run == 'true'
        run: |
          mkdir -p "$HOME/.local/bin"
          cat > "$HOME/.local/bin/buffer-cli" <<'STUB'
          #!/usr/bin/env bash
          # Stub buffer-cli for dry-run: log args, never post.
          printf '[stub buffer-cli] argv:' >&2
          for a in "$@"; do printf ' %q' "$a" >&2; done
          printf '\n' >&2
          echo '{"id":"stub","scheduled_at":null}'
          STUB
          chmod +x "$HOME/.local/bin/buffer-cli"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Promote with Claude
        if: steps.live.outputs.should_run == 'true'
        uses: anthropics/claude-code-action@787c5a0ce96a9a6cfb050ea0c8f4c05f2447c251 # v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            Promote the following blog post(s) to social media.

            Read .claude/commands/promote-post.md for full instructions, then execute.

            Two skills shape the writing — use them, don't just acknowledge them:

            - `kemal-voice` (.claude/skills/kemal-voice/SKILL.md) — anchors the
              author's voice and lists banned vocabulary / formulaic openers.
              Read it before drafting.
            - `humanizer` (.claude/skills/humanizer/SKILL.md) — AI-pattern
              cleanup pass. After drafting each platform's message, run it
              through the humanizer pass before posting. Apply the final
              anti-AI audit ("what makes this obviously AI-generated?" → fix).

            Posts to promote:
            ${{ steps.live.outputs.posts }}
          claude_args: --allowedTools "Read,Bash(buffer-cli:*),Bash(echo:*)"
        env:
          BUFFER_AUTH_TOKEN: ${{ secrets.BUFFER_AUTH_TOKEN }}
