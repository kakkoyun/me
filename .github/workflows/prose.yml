name: Prose Lint

on:
  push:
    branches: [master]
    paths:
      - 'content/**/*.md'
      - '.vale.ini'
      - 'styles/**'
  pull_request:
    paths:
      - 'content/**/*.md'
      - '.vale.ini'
      - 'styles/**'

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  vale:
    name: Vale
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Vale prose lint (advisory)
        # Renovate will pin this to a SHA on the next update cycle.
        uses: errata-ai/vale-action@v2
        with:
          fail_on_error: false
          filter_mode: added
          reporter: github-pr-check
          files: content
          vale_flags: "--minAlertLevel=warning"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
