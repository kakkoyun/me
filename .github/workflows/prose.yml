name: Prose Lint

on:
  push:
    branches: [master]
    paths:
      - 'content/**/*.md'
      - '.vale.ini'
      - 'styles/**'
  pull_request:
    paths:
      - 'content/**/*.md'
      - '.vale.ini'
      - 'styles/**'

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  vale:
    name: Vale
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Vale prose lint (advisory)
        uses: vale-cli/vale-action@85f9f7f2c5f449ac0ae5b66662961bae3f77ca6a # 2.1.2
        with:
          fail_on_error: false
          filter_mode: added
          reporter: github-pr-check
          level: info
          files: content
          token: ${{ secrets.GITHUB_TOKEN }}
