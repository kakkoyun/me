[build]
publish = "public"
command = "hugo --gc --minify"

[context.production]
command = "hugo --gc --minify --enableGitInfo"
ignore = "bash scripts/netlify-ignore.sh"

[context.production.environment]
HUGO_VERSION = "0.164.0"
HUGO_ENV = "production"
HUGO_ENABLEGITINFO = "true"

[context.deploy-preview]
command = "hugo --gc --minify --buildFuture -b $DEPLOY_PRIME_URL"
ignore = "bash scripts/netlify-ignore.sh"

[context.deploy-preview.environment]
HUGO_VERSION = "0.164.0"

[context.branch-deploy]
command = "hugo --gc --minify -b $DEPLOY_PRIME_URL"
# Disable: don't render bare branch pushes that have no PR open. PR previews
# still work via [context.deploy-preview]; production deploys via [context.production].
ignore = "exit 0"

[context.branch-deploy.environment]
HUGO_VERSION = "0.164.0"

[[plugins]]
package = "netlify-plugin-cache"

  [plugins.inputs]
  paths = [
    "resources/_gen",
    ".cache/hugo",
    ".cache/hugo_cache",
  ]

[[redirects]]
  from = "https://kakkoyun.me/notes/*"
  to = "https://publish.obsidian.md/serve?url=kakkoyun.me/notes/:splat"
  status = 200
  force = true
